name: Update CNAPS Data

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0 * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Run scraper on CN server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CN_SERVER_HOST }}
          username: ${{ secrets.CN_SERVER_USER }}
          key: ${{ secrets.CN_SERVER_SSH_KEY }}
          script: |
            set -e
            cd ~/CNAPS
            git pull
            cd packages/core
            pnpm run start
            cd ~/CNAPS
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/core/assets/
            git diff --cached --quiet || git commit -m "chore: update CNAPS data $(date +'%Y-%m-%d')"
            git push
