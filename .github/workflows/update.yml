name: Update CNAPS Data

on:
  workflow_dispatch:

  schedule:
    - cron: '0 0 * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Run scraper on CN server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CN_SERVER_HOST }}
          username: ${{ secrets.CN_SERVER_USER }}
          key: ${{ secrets.CN_SERVER_SSH_KEY }}
          port: ${{ secrets.CN_SERVER_PORT }}
          script: |
            set -e
            command -v node || (curl -fsSL https://deb.nodesource.com/setup_lts.x | bash - && apt install -y nodejs)
            command -v pnpm || npm i -g pnpm
            [ -d ~/CNAPS ] || git clone https://github.com/normalman743/CNAPS.git ~/CNAPS
            cd ~/CNAPS
            git pull
            cd packages/core
            pnpm install --frozen-lockfile
            pnpm run start
            cd ~/CNAPS
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/core/assets/
            git diff --cached --quiet || git commit -m "chore: update CNAPS data $(date +'%Y-%m-%d')"
            git push
