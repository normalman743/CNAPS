name: Update CNAPS Data

on:
  workflow_dispatch:

  schedule:
    # 北京时间 04:00（UTC 20:00），避开白天高峰
    - cron: '0 20 * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 不再用 SSH 隧道 + proxychains：那层扛不住 70 并发会卡死。
      # 改为 SSH 进 SG VPS，让爬虫在 SG 上原生直连甘肃银行运行
      # （SG 可直连、千兆、原生并发），跑完直接在 SG 上 git push 回仓库。
      # ssh-action 会把远端 stdout 实时回传到本 Actions 日志，进度/ETA 照常可见。
      - name: Run scraper natively on SG VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CN_SERVER_HOST }}
          username: ${{ secrets.CN_SERVER_USER }}
          key: ${{ secrets.CN_SERVER_SSH_KEY }}
          port: ${{ secrets.CN_SERVER_PORT }}
          command_timeout: 120m
          script: |
            set -e
            export PATH="$PATH:/usr/local/bin:/usr/bin"

            # 1. 确保 node / pnpm / ni 就绪（首次自动安装）
            command -v node >/dev/null 2>&1 || {
              curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
              apt-get install -y nodejs
            }
            command -v pnpm >/dev/null 2>&1 || npm i -g pnpm
            command -v nr   >/dev/null 2>&1 || npm i -g @antfu/ni

            # 2. 克隆 / 同步仓库到 origin/main 干净状态
            #    （git push 走 SG 上配置的 deploy key，remote 用 SSH）
            if [ ! -d ~/CNAPS/.git ]; then
              git clone git@github.com:normalman743/CNAPS.git ~/CNAPS
            fi
            cd ~/CNAPS
            git fetch origin
            git reset --hard origin/main

            # 3. 安装依赖并原生跑爬虫（直连甘肃，无隧道）
            pnpm install --frozen-lockfile
            cd packages/core
            nr start

            # 4. 有变化就提交并推回（floor 守卫触发时 nr start 已非 0 退出，
            #    set -e 会在此之前中止，不会推上残缺数据）
            cd ~/CNAPS
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/core/assets/
            git diff --cached --quiet || {
              git commit -m "chore: update CNAPS data $(date +'%Y-%m-%d')"
              git push origin main
            }
