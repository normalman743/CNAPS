name: Update CNAPS Data

on:
  workflow_dispatch:

  schedule:
    # 北京时间 04:00（UTC 20:00），避开白天高峰
    - cron: '0 20 * * *'

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 不用 SSH 隧道（那层扛不住 70 并发会卡死）。
      # GitHub Actions SSH 进 SG VPS，让爬虫在 SG 上原生直连甘肃银行运行
      # （千兆、原生并发），跑完用 PAT 经 HTTPS push 回仓库。
      # ssh-action 把远端 stdout 实时回传到本 Actions 日志，进度/ETA 照常可见。
      - name: Run scraper natively on SG VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.CN_SERVER_HOST }}
          username: ${{ secrets.CN_SERVER_USER }}
          key: ${{ secrets.CN_SERVER_SSH_KEY }}
          port: ${{ secrets.CN_SERVER_PORT }}
          command_timeout: 120m
          envs: GH_TOKEN
          script: |
            set -e
            export PATH="$PATH:/usr/local/bin:/usr/bin"

            # 1. 确保 node / pnpm / ni 就绪（首次自动安装）
            command -v node >/dev/null 2>&1 || {
              curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -
              apt-get install -y nodejs
            }
            command -v pnpm >/dev/null 2>&1 || npm i -g pnpm
            command -v nr   >/dev/null 2>&1 || npm i -g @antfu/ni

            # 2. 克隆（公开仓库走 HTTPS，无需凭证）/ 同步到 origin/main 干净状态
            if [ ! -d ~/CNAPS/.git ]; then
              git clone https://github.com/normalman743/CNAPS.git ~/CNAPS
            fi
            cd ~/CNAPS
            git fetch origin
            git reset --hard origin/main

            # 3. 安装依赖并原生跑爬虫（直连甘肃，无隧道）
            pnpm install --frozen-lockfile
            cd packages/core
            nr start

            # 4. 有变化就提交并推回（push 用 PAT，token 只在命令行内联、不落盘 .git/config）。
            #    floor 守卫触发时 nr start 已非 0 退出，set -e 会在此之前中止，不推残缺数据。
            cd ~/CNAPS
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add packages/core/assets/
            git diff --cached --quiet || {
              git commit -m "chore: update CNAPS data $(date +'%Y-%m-%d')"
              git push "https://x-access-token:${GH_TOKEN}@github.com/normalman743/CNAPS.git" HEAD:main
            }
